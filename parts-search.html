<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F1114">
<title>Parts Keyword Search</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0F1114;--card:#181B20;--input:#1E2228;
    --border:#2A2E35;--accent:#22C55E;--accent2:#16A34A;
    --text:#E8E8E8;--text2:#8B8F96;--muted:#565A62;
    --font:'JetBrains Mono','Fira Code','SF Mono','Consolas',monospace;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font)}

  .header{
    border-bottom:1px solid var(--border);padding:20px 28px;
    display:flex;align-items:center;gap:14px;
  }
  .logo{
    width:36px;height:36px;border-radius:8px;flex-shrink:0;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;
    font-size:18px;font-weight:800;color:#000;
  }
  .header-title{font-weight:700;font-size:16px;letter-spacing:-0.02em}
  .header-sub{font-size:11px;color:var(--muted);margin-top:2px}
  .main{padding:20px 28px}

  .dropzone{
    border:2px dashed var(--border);border-radius:12px;
    padding:56px 24px;text-align:center;cursor:pointer;transition:all .2s;
  }
  .dropzone.over{border-color:var(--accent);background:rgba(34,197,94,.03)}
  .dropzone-icon{font-size:32px;margin-bottom:12px;opacity:.6}
  .dropzone-label{font-size:14px;font-weight:600;margin-bottom:6px}
  .dropzone-hint{font-size:12px;color:var(--muted)}

  .tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
  .tab{
    padding:7px 16px;font-size:12px;font-weight:600;font-family:var(--font);
    border:1px solid var(--border);border-radius:6px;
    background:transparent;color:var(--text2);cursor:pointer;
    transition:all .15s;letter-spacing:.02em;
  }
  .tab.active{border-color:var(--accent);background:rgba(34,197,94,.09);color:var(--accent)}
  .tab-reset{
    padding:7px 14px;font-size:11px;font-family:var(--font);
    border:1px solid var(--border);border-radius:6px;
    background:transparent;color:var(--muted);cursor:pointer;
    transition:all .15s;margin-left:auto;
  }

  .search-bar{
    display:flex;align-items:center;background:var(--input);
    border:1px solid var(--border);border-radius:8px;
    padding:0 14px;gap:10px;margin-bottom:20px;
  }
  .search-icon{color:var(--muted);font-size:16px;flex-shrink:0}
  .search-input{
    flex:1;padding:14px 0;font-size:14px;font-family:var(--font);
    background:transparent;border:none;outline:none;color:var(--text);
  }
  .search-input::placeholder{color:var(--muted)}
  .clear-btn{
    background:transparent;border:none;color:var(--muted);
    font-size:16px;cursor:pointer;padding:4px 6px;line-height:1;
  }

  .results-info{
    font-size:12px;color:var(--muted);margin-bottom:10px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .results-info span:last-child{font-size:11px}
  .table-wrap{border-radius:8px;border:1px solid var(--border);overflow:hidden}
  .table-header{
    display:grid;background:var(--card);
    border-bottom:1px solid var(--border);padding:10px 16px;gap:12px;
  }
  .th{
    font-size:10px;font-weight:700;color:var(--muted);
    text-transform:uppercase;letter-spacing:.08em;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .table-body{max-height:calc(100vh - 280px);overflow-y:auto}
  .row{
    display:grid;padding:10px 16px;gap:12px;
    border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;
  }
  .row:hover{background:var(--card)}
  .row.focused{background:rgba(34,197,94,.04)}
  .cell{font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cell.desc{color:var(--text)}
  .cell.id-col{font-weight:600}
  .row.focused .cell{white-space:normal;word-break:break-word}

  .detail{
    margin-top:12px;background:var(--card);
    border:1px solid var(--border);border-radius:8px;padding:18px;
  }
  .detail-title{
    font-size:11px;font-weight:700;color:var(--accent);
    text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;
  }
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 24px}
  .detail-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .detail-value{font-size:13px;color:var(--text);word-break:break-word;margin-top:2px;margin-bottom:6px}

  .empty{text-align:center;padding:48px 24px;color:var(--muted);font-size:13px}
  .empty-icon{font-size:28px;margin-bottom:10px;opacity:.4}
  .empty-hint{margin-top:12px;font-size:11px;line-height:1.8;opacity:.7}

  @media(max-width:600px){
    .header{padding:16px 16px}
    .main{padding:16px 16px}
    .detail-grid{grid-template-columns:1fr}
    .table-header,.row{padding:8px 10px;gap:8px}
    .cell,.th{font-size:11px}
    .search-input{font-size:13px;padding:12px 0}
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">⚙</div>
  <div>
    <div class="header-title">PARTS KEYWORD SEARCH</div>
    <div class="header-sub" id="subtitle">Load your MPulse inventory (CSV or Excel) to begin</div>
  </div>
</div>

<div class="main">
  <div class="dropzone" id="dropzone" style="display:block">
    <input type="file" id="fileInput" accept=".csv,.xls,.xlsx" style="display:none">
    <div class="dropzone-icon">📂</div>
    <div class="dropzone-label">Drop your CSV or Excel file here</div>
    <div class="dropzone-hint">or click to browse — supports .csv, .xls, and .xlsx</div>
  </div>

  <div id="searchUI" style="display:none">
    <div class="tabs" id="tabs"></div>
    <div class="search-bar">
      <span class="search-icon">⌕</span>
      <input class="search-input" id="searchInput" type="text" placeholder="Type keywords…">
      <button class="clear-btn" id="clearBtn" style="display:none">✕</button>
    </div>
    <div id="resultsArea"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
(function(){
  let allRows=[],allHeaders=[],colMap=null,mode='inventory_id',results=null,focusedIdx=null,searchTimer=null;

  const dropzone=document.getElementById('dropzone');
  const fileInput=document.getElementById('fileInput');
  const searchUI=document.getElementById('searchUI');
  const subtitle=document.getElementById('subtitle');
  const tabs=document.getElementById('tabs');
  const input=document.getElementById('searchInput');
  const clearBtn=document.getElementById('clearBtn');
  const area=document.getElementById('resultsArea');

  function parseCSV(text){
    const lines=[];let cur='',inQ=false;
    for(let i=0;i<text.length;i++){
      const c=text[i];
      if(c==='"'){if(inQ&&text[i+1]==='"'){cur+='"';i++}else inQ=!inQ}
      else if(c==='\n'&&!inQ){if(cur.trim()||lines.length)lines.push(cur);cur=''}
      else if(c==='\r'&&!inQ){}
      else cur+=c;
    }
    if(cur.trim())lines.push(cur);
    if(!lines.length)return{headers:[],rows:[]};
    function split(line){
      const f=[];let s='',q=false;
      for(let i=0;i<line.length;i++){
        const c=line[i];
        if(c==='"'){if(q&&line[i+1]==='"'){s+='"';i++}else q=!q}
        else if(c===','&&!q){f.push(s);s=''}
        else s+=c;
      }f.push(s);return f;
    }
    const headers=split(lines[0]).map(h=>h.trim());
    const rows=[];
    for(let i=1;i<lines.length;i++){
      const v=split(lines[i]),obj={};
      headers.forEach((h,j)=>{obj[h]=(v[j]||'').trim()});
      rows.push(obj);
    }
    return{headers,rows};
  }

  function parseExcel(data){
    const wb=XLSX.read(data,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const json=XLSX.utils.sheet_to_json(ws,{defval:''});
    if(!json.length)return{headers:[],rows:[]};
    const headers=Object.keys(json[0]);
    const rows=json.map(r=>{const obj={};headers.forEach(h=>{obj[h]=String(r[h]||'').trim()});return obj});
    return{headers,rows};
  }

  function isExcel(name){const ext=name.toLowerCase().split('.').pop();return ext==='xls'||ext==='xlsx'}

  function detectColumns(headers){
    function find(cands){
      for(const c of cands){const m=headers.find(h=>h.toLowerCase().replace(/[^a-z0-9]/g,'')===c.toLowerCase().replace(/[^a-z0-9]/g,''));if(m)return m}
      for(const c of cands){const m=headers.find(h=>h.toLowerCase().includes(c.toLowerCase()));if(m)return m}
      return null;
    }
    return{
      description:find(['Description','Desc','PartDescription','ItemDescription'])||headers[0],
      inventory_id:find(['InventoryID','Inventory ID#','InventoryID#','PartNumber','Part#','ID'])||null,
      manufacturer_part:find(['Manufacturer Part #','Manufacturer Part#','MfrPart#','MfrPartNumber','ManufacturerPart','Mfr Part','MPN'])||null,
      location:find(['Location','Loc','BinLocation','StorageLocation'])||null,
      stock_area:find(['Stock Area','StockArea','Stock Description','StockDescription'])||null,
      stock:find(['StockQuantities','Stock Quantities','Qty','Quantity','QtyOnHand','Stock'])||null,
    };
  }

  // ─── IndexedDB Cache ───
  const DB_NAME='PartsSearchCache';const DB_STORE='data';
  function openDB(){
    return new Promise((res,rej)=>{
      const req=indexedDB.open(DB_NAME,1);
      req.onupgradeneeded=()=>req.result.createObjectStore(DB_STORE);
      req.onsuccess=()=>res(req.result);
      req.onerror=()=>rej(req.error);
    });
  }
  async function cacheSet(key,val){try{const db=await openDB();const tx=db.transaction(DB_STORE,'readwrite');tx.objectStore(DB_STORE).put(val,key);await new Promise(r=>{tx.oncomplete=r})}catch(e){}}
  async function cacheGet(key){try{const db=await openDB();const tx=db.transaction(DB_STORE,'readonly');const req=tx.objectStore(DB_STORE).get(key);return new Promise(r=>{req.onsuccess=()=>r(req.result);req.onerror=()=>r(null)})}catch(e){return null}}
  async function cacheClear(){try{const db=await openDB();const tx=db.transaction(DB_STORE,'readwrite');tx.objectStore(DB_STORE).clear()}catch(e){}}

  function loadParsed(r,fileName,skipCache){
    allHeaders=r.headers;allRows=r.rows;
    colMap=detectColumns(allHeaders);
    results=null;focusedIdx=null;
    subtitle.textContent=allRows.length.toLocaleString()+' parts loaded from '+fileName;
    dropzone.style.display='none';searchUI.style.display='block';
    buildTabs();updatePlaceholder();renderResults();
    input.value='';clearBtn.style.display='none';
    setTimeout(()=>input.focus(),100);
    if(!skipCache)cacheSet('parts',{headers:r.headers,rows:r.rows,fileName:fileName});
  }

  // Try loading cached data on startup
  (async function(){
    const cached=await cacheGet('parts');
    if(cached&&cached.rows&&cached.rows.length){
      loadParsed({headers:cached.headers,rows:cached.rows},cached.fileName+' (cached)',true);
    }
  })();

  function handleFile(file){
    if(!file)return;
    const reader=new FileReader();
    if(isExcel(file.name)){
      reader.onload=function(e){loadParsed(parseExcel(new Uint8Array(e.target.result)),file.name)};
      reader.readAsArrayBuffer(file);
    }else{
      reader.onload=function(e){loadParsed(parseCSV(e.target.result),file.name)};
      reader.readAsText(file);
    }
  }

  dropzone.addEventListener('click',()=>fileInput.click());
  fileInput.addEventListener('change',e=>handleFile(e.target.files[0]));
  dropzone.addEventListener('dragover',e=>{e.preventDefault();dropzone.classList.add('over')});
  dropzone.addEventListener('dragleave',()=>dropzone.classList.remove('over'));
  dropzone.addEventListener('drop',e=>{e.preventDefault();dropzone.classList.remove('over');handleFile(e.dataTransfer.files[0])});

  const MODES=[
    {key:'all',label:'All Fields'},
    {key:'inventory_id',label:'Inventory ID'},
    {key:'manufacturer_part',label:'Mfr Part #'},
    {key:'description',label:'Description'},
    {key:'location',label:'Location'},
    {key:'stock_area',label:'Stock Area'}
  ];

  function buildTabs(){
    tabs.innerHTML='';
    MODES.forEach(m=>{
      const field=m.key==='all'?true:colMap[m.key];
      if(!field)return;
      const btn=document.createElement('button');
      btn.className='tab'+(mode===m.key?' active':'');
      btn.textContent=m.label;
      btn.onclick=()=>{mode=m.key;buildTabs();updatePlaceholder();doSearch();input.focus()};
      tabs.appendChild(btn);
    });
    const reset=document.createElement('button');
    reset.className='tab-reset';
    reset.textContent='↻ New File';
    reset.onclick=()=>{
      allRows=[];allHeaders=[];colMap=null;results=null;focusedIdx=null;
      subtitle.textContent='Load your MPulse inventory (CSV or Excel) to begin';
      searchUI.style.display='none';dropzone.style.display='block';
      area.innerHTML='';input.value='';cacheClear();
    };
    tabs.appendChild(reset);
  }

  function updatePlaceholder(){
    const ph={all:'Search all fields… e.g. "bearing 21-11"',inventory_id:'Search by ID… e.g. "DB-081"',manufacturer_part:'Search by manufacturer part #… e.g. "138460"',description:'Type keywords… e.g. "19 roll bearing"',location:'Search by location… e.g. "21-24-6A"',stock_area:'Search by stock area… e.g. "APTX"'};
    input.placeholder=ph[mode]||'Search…';
  }

  function doSearch(){
    const q=input.value.trim();
    if(!q||!colMap){results=null;focusedIdx=null;renderResults();return}
    const kws=q.toLowerCase().split(/\s+/);
    if(mode==='all'){
      const fields=[colMap.inventory_id,colMap.manufacturer_part,colMap.description,colMap.location,colMap.stock_area].filter(Boolean);
      results=allRows.filter(row=>{
        const combined=fields.map(f=>(row[f]||'')).join(' ').toLowerCase();
        return kws.every(kw=>combined.includes(kw));
      });
    }else{
      const fieldKey=colMap[mode];
      if(!fieldKey){results=[];focusedIdx=null;renderResults();return}
      results=allRows.filter(row=>{const text=(row[fieldKey]||'').toLowerCase();return kws.every(kw=>text.includes(kw))});
    }
    focusedIdx=null;renderResults();
  }

  input.addEventListener('input',()=>{
    clearBtn.style.display=input.value?'block':'none';
    clearTimeout(searchTimer);searchTimer=setTimeout(doSearch,300);
  });
  input.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();doSearch()}});
  clearBtn.addEventListener('click',()=>{input.value='';clearBtn.style.display='none';results=null;focusedIdx=null;renderResults();input.focus()});

  function getDisplayCols(){
    if(!colMap)return[];
    return[colMap.inventory_id,colMap.manufacturer_part,colMap.description,colMap.location,colMap.stock_area,colMap.stock].filter(Boolean);
  }
  function gridCols(cols){
    return cols.map(c=>{if(c===colMap.description)return'2fr';if(c===colMap.stock)return'80px';if(c===colMap.manufacturer_part)return'1.2fr';return'1fr'}).join(' ');
  }

  function renderResults(){
    const cols=getDisplayCols();let html='';
    if(results===null){
      html=`<div class="empty"><div class="empty-icon">⚙</div>Start typing to search ${allRows.length.toLocaleString()} parts<div class="empty-hint">All keywords must match (AND logic) — order doesn't matter</div></div>`;
      area.innerHTML=html;return;
    }
    const modeLabel=mode==='all'?'all fields':mode==='inventory_id'?'IDs':mode==='manufacturer_part'?'Mfr Part #s':mode==='description'?'descriptions':mode==='stock_area'?'stock areas':'locations';
    html+=`<div class="results-info"><span>${results.length===0?'No matching parts found':results.length+' result'+(results.length!==1?'s':'')}</span>${results.length>0?'<span>Searching '+modeLabel+'</span>':''}</div>`;
    if(results.length>0){
      const gc=gridCols(cols);
      html+=`<div class="table-wrap"><div class="table-header" style="grid-template-columns:${gc}">`;
      cols.forEach(c=>{html+=`<div class="th">${esc(c)}</div>`});
      html+=`</div><div class="table-body">`;
      results.forEach((row,i)=>{
        html+=`<div class="row${focusedIdx===i?' focused':''}" data-idx="${i}" style="grid-template-columns:${gc}">`;
        cols.forEach(c=>{
          let cl='cell';if(c===colMap.description)cl+=' desc';if(c===colMap.inventory_id)cl+=' id-col';
          html+=`<div class="${cl}">${esc(row[c]||'—')}</div>`;
        });
        html+=`</div>`;
      });
      html+=`</div></div>`;
    }
    if(focusedIdx!==null&&results[focusedIdx]){
      const row=results[focusedIdx];
      html+=`<div class="detail"><div class="detail-title">Full Details</div><div class="detail-grid">`;
      allHeaders.forEach(h=>{const v=row[h];if(!v)return;html+=`<div><div class="detail-label">${esc(h)}</div><div class="detail-value">${esc(v)}</div></div>`});
      html+=`</div></div>`;
    }
    area.innerHTML=html;
    area.querySelectorAll('.row').forEach(el=>{
      el.addEventListener('click',()=>{
        const tb=area.querySelector('.table-body');
        const scrollPos=tb?tb.scrollTop:0;
        const idx=parseInt(el.dataset.idx);
        focusedIdx=focusedIdx===idx?null:idx;
        renderResults();
        const tb2=area.querySelector('.table-body');
        if(tb2)tb2.scrollTop=scrollPos;
      });
    });
  }

  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
})();
</script>
</body>
</html>
